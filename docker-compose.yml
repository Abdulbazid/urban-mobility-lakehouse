name: urban-mobility-lakehouse

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-pg/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    _PIP_ADDITIONAL_REQUIREMENTS: "kafka-python==2.0.2 requests==2.32.3 duckdb==1.0.0 pandas==2.2.2"
    S3_ENDPOINT: http://minio:9000
    S3_ACCESS_KEY: minioadmin
    S3_SECRET_KEY: minioadmin
    KAFKA_BOOTSTRAP: kafka:9092
    WEATHER_LAT: "40.7128"
    WEATHER_LON: "-74.0060"
  volumes:
    - ./orchestration/dags:/opt/airflow/dags
    - ./orchestration/logs:/opt/airflow/logs
    - ./orchestration/plugins:/opt/airflow/plugins
    - ./transformation:/opt/airflow/transformation:ro
  depends_on:
    airflow-pg:
      condition: service_healthy

services:
  # ------------------------- Storage -------------------------
  minio:
    image: minio/minio:latest
    container_name: uml-minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio-data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: uml-minio-init
    depends_on: { minio: { condition: service_healthy } }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/bronze local/silver local/gold;
      echo '✅ buckets ready'; "

  # ------------------------- Kafka ---------------------------
  kafka:
    image: bitnami/kafka:3.7
    container_name: uml-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: uml-kafka-ui
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on: [kafka]

  topic-init:
    image: bitnami/kafka:3.7
    container_name: uml-topic-init
    depends_on: { kafka: { condition: service_healthy } }
    entrypoint: >
      /bin/sh -c "
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic trips_raw --partitions 3 --replication-factor 1;
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic weather_raw --partitions 1 --replication-factor 1;
      echo '✅ topics ready'; "

  # ------------------------- Producer ------------------------
  producer:
    build: ./ingestion
    container_name: uml-producer
    depends_on: { kafka: { condition: service_healthy } }
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC_TRIPS: trips_raw
    volumes:
      - ./ingestion:/app
    profiles: ["manual"]      # only starts when explicitly run via `make seed`

  # ------------------------- dbt -----------------------------
  dbt:
    image: ghcr.io/dbt-labs/dbt-duckdb:1.8.3
    container_name: uml-dbt
    working_dir: /usr/app
    volumes:
      - ./dbt:/usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app
    profiles: ["manual"]

  # ------------------------- Airflow -------------------------
  airflow-pg:
    image: postgres:16
    container_name: uml-airflow-pg
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: uml-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: uml-airflow-web
    command: webserver
    ports: ["8088:8080"]
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    container_name: uml-airflow-sched
    command: scheduler
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  # ------------------------- Metabase ------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: uml-metabase
    ports: ["3000:3000"]
    volumes:
      - metabase-data:/metabase-data
      - ./dbt:/data:ro
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  minio-data:
  metabase-data:
