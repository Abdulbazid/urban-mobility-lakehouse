urban_mobility:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "/usr/app/gold.duckdb"
      threads: 4
      extensions:
        - httpfs
        - delta
      settings:
        s3_region: us-east-1
        s3_endpoint: "minio:9000"
        s3_use_ssl: false
        s3_url_style: path
        s3_access_key_id: minioadmin
        s3_secret_access_key: minioadmin
